# Fly.io deployment config for the mic-check lookup backend.
# Generated once and committed. Re-run `fly launch --no-deploy --copy-config`
# only if Fly's defaults change underneath us.
#
# Replace `app = "mic-check-lookup"` with the actual app name after `fly launch`
# if Fly suggests a different one. Region (`primary_region`) should match
# wherever the iOS user base is concentrated; `iad` (US east) is a safe default.

app = "mic-check-lookup"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  BIBLE_API_URL = "https://bible-api.com"
  BIBLE_TRANSLATION = "web"
  LOOKUP_PROVIDER_ORDER = "gemini,openrouter,groq"
  LOOKUP_MAX_RETRIES = "3"
  LOOKUP_MAX_CONCURRENCY = "8"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "get"
  path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
